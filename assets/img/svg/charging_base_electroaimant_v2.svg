<svg width="100%" viewBox="0 0 680 740" role="img" style="background:#0d0d0d;" xmlns="http://www.w3.org/2000/svg">
<title>Base de recharge the_watCh3r — Architecture avec électroaimant</title>
<desc>Schéma potentiel de la station de recharge autonome avec Raspberry Pi, relais de charge, électroaimant et communication MAVLink WiFi</desc>
<defs>
  <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- TITRE -->
<text x="340" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#FFFFFF" font-family="Arial,sans-serif">Charging base — potential architecture</text>
<text x="340" y="46" text-anchor="middle" font-size="11" fill="#666" font-family="Arial,sans-serif">the_watCh3r — autonomous recharge &amp; holding system (not final)</text>

<!-- Badge "Potential Architecture" -->
<rect x="240" y="54" width="200" height="22" rx="6" fill="#412402" stroke="#854F0B" stroke-width="1"/>
<text x="340" y="69" text-anchor="middle" font-size="11" fill="#EF9F27" font-family="Arial,sans-serif">⚠ Potential architecture — not started</text>

<!-- SECTEUR 220V -->
<rect x="250" y="90" width="180" height="50" rx="8" fill="#173404" stroke="#3B6D11" stroke-width="1.5"/>
<text x="340" y="111" text-anchor="middle" font-size="13" font-weight="600" fill="#C0DD97" font-family="Arial,sans-serif">Secteur 220V AC</text>
<text x="340" y="128" text-anchor="middle" font-size="11" fill="#639922" font-family="Arial,sans-serif">Alimentation murale</text>
<line x1="340" y1="140" x2="340" y2="168" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arr-green)"/>

<!-- ALIMENTATION DC -->
<rect x="210" y="168" width="260" height="50" rx="8" fill="#412402" stroke="#854F0B" stroke-width="1.5"/>
<text x="340" y="189" text-anchor="middle" font-size="13" font-weight="600" fill="#FAC775" font-family="Arial,sans-serif">Alimentation DC</text>
<text x="340" y="206" text-anchor="middle" font-size="11" fill="#BA7517" font-family="Arial,sans-serif">220V → 24V / 5V multi-sortie</text>
<line x1="340" y1="218" x2="340" y2="246" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr-amber)"/>
<text x="356" y="236" font-size="10" fill="#854F0B" font-family="Arial,sans-serif">5V / 24V</text>

<!-- RASPBERRY PI BASE -->
<rect x="190" y="246" width="300" height="74" rx="8" fill="#26215C" stroke="#534AB7" stroke-width="1.5"/>
<text x="340" y="268" text-anchor="middle" font-size="13" font-weight="600" fill="#CECBF6" font-family="Arial,sans-serif">Raspberry Pi — base</text>
<text x="340" y="285" text-anchor="middle" font-size="11" fill="#7F77DD" font-family="Arial,sans-serif">Cerveau de la station</text>
<text x="340" y="301" text-anchor="middle" font-size="11" fill="#7F77DD" font-family="Arial,sans-serif">Détection + logique GPIO / WiFi MAVLink</text>

<!-- RASPBERRY → RELAIS CHARGE (gauche) -->
<line x1="190" y1="283" x2="128" y2="283" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr-purple)"/>

<!-- RELAIS CHARGE -->
<rect x="28" y="258" width="100" height="50" rx="8" fill="#4A1B0C" stroke="#993C1D" stroke-width="1.5"/>
<text x="78" y="279" text-anchor="middle" font-size="13" font-weight="600" fill="#F5C4B3" font-family="Arial,sans-serif">Relais</text>
<text x="78" y="296" text-anchor="middle" font-size="11" fill="#D85A30" font-family="Arial,sans-serif">charge 5V</text>

<!-- RASPBERRY → RELAIS AIMANT (droite) -->
<line x1="490" y1="283" x2="552" y2="283" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr-purple)"/>

<!-- RELAIS AIMANT -->
<rect x="552" y="258" width="100" height="50" rx="8" fill="#4A1B0C" stroke="#993C1D" stroke-width="1.5"/>
<text x="602" y="279" text-anchor="middle" font-size="13" font-weight="600" fill="#F5C4B3" font-family="Arial,sans-serif">Relais</text>
<text x="602" y="296" text-anchor="middle" font-size="11" fill="#D85A30" font-family="Arial,sans-serif">aimant 5V</text>

<!-- ALIM DC → PAD (alimentation directe 24V) -->
<line x1="210" y1="185" x2="78" y2="185" stroke="#BA7517" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="78" y1="185" x2="78" y2="258" stroke="#BA7517" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-amber)"/>
<text x="16" y="178" font-size="10" fill="#854F0B" font-family="Arial,sans-serif">24V</text>

<!-- ALIM DC → AIMANT (alimentation directe 24V) -->
<line x1="470" y1="185" x2="602" y2="185" stroke="#BA7517" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="602" y1="185" x2="602" y2="258" stroke="#BA7517" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-amber)"/>
<text x="612" y="178" font-size="10" fill="#854F0B" font-family="Arial,sans-serif">24V</text>

<!-- RELAIS CHARGE → PAD CHARGE -->
<line x1="78" y1="308" x2="78" y2="390" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr-coral)"/>

<!-- PAD RECHARGE -->
<rect x="28" y="390" width="100" height="64" rx="8" fill="#04342C" stroke="#0F6E56" stroke-width="1.5"/>
<text x="78" y="412" text-anchor="middle" font-size="13" font-weight="600" fill="#9FE1CB" font-family="Arial,sans-serif">Pad charge</text>
<text x="78" y="429" text-anchor="middle" font-size="11" fill="#1D9E75" font-family="Arial,sans-serif">XT60 + JST-XH</text>
<text x="78" y="445" text-anchor="middle" font-size="11" fill="#1D9E75" font-family="Arial,sans-serif">balance lead</text>

<!-- RELAIS AIMANT → ELECTRO-AIMANT -->
<line x1="602" y1="308" x2="602" y2="390" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr-coral)"/>

<!-- ELECTRO-AIMANT -->
<rect x="552" y="390" width="100" height="64" rx="8" fill="#042C53" stroke="#185FA5" stroke-width="1.5"/>
<text x="602" y="412" text-anchor="middle" font-size="13" font-weight="600" fill="#B5D4F4" font-family="Arial,sans-serif">Électro-</text>
<text x="602" y="429" text-anchor="middle" font-size="13" font-weight="600" fill="#B5D4F4" font-family="Arial,sans-serif">aimant</text>
<text x="602" y="446" text-anchor="middle" font-size="11" fill="#378ADD" font-family="Arial,sans-serif">24V DC</text>

<!-- SÉQUENCE AUTOMATIQUE -->
<rect x="160" y="490" width="360" height="114" rx="8" fill="#1a1a1a" stroke="#444441" stroke-width="1"/>
<text x="340" y="512" text-anchor="middle" font-size="13" font-weight="600" fill="#D3D1C7" font-family="Arial,sans-serif">Séquence automatique</text>
<text x="180" y="530" font-size="11" fill="#888780" font-family="Arial,sans-serif">1. Drone signale batterie faible via WiFi</text>
<text x="180" y="548" font-size="11" fill="#888780" font-family="Arial,sans-serif">2. Aimant ON → maintient le drone posé</text>
<text x="180" y="566" font-size="11" fill="#888780" font-family="Arial,sans-serif">3. Charge ON → recharge LiPo</text>
<text x="180" y="584" font-size="11" fill="#888780" font-family="Arial,sans-serif">4. Batterie pleine → charge OFF, aimant OFF</text>

<!-- RASPBERRY → SÉQUENCE -->
<line x1="340" y1="320" x2="340" y2="490" stroke="#534AB7" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>

<!-- DRONE (bas) -->
<rect x="210" y="630" width="260" height="50" rx="8" fill="#042C53" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="340" y="651" text-anchor="middle" font-size="13" font-weight="600" fill="#B5D4F4" font-family="Arial,sans-serif">Drone (the_watCh3r)</text>
<text x="340" y="668" text-anchor="middle" font-size="11" fill="#378ADD" font-family="Arial,sans-serif">État batterie via WiFi MAVLink</text>

<!-- SÉQUENCE → DRONE -->
<line x1="340" y1="604" x2="340" y2="630" stroke="#378ADD" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
<text x="350" y="620" font-size="10" fill="#185FA5" font-family="Arial,sans-serif">WiFi</text>

<!-- LÉGENDE -->
<line x1="40" y1="710" x2="66" y2="710" stroke="#7F77DD" stroke-width="1.5"/>
<text x="72" y="714" font-size="10" fill="#666" font-family="Arial,sans-serif">GPIO</text>
<line x1="120" y1="710" x2="146" y2="710" stroke="#BA7517" stroke-width="1" stroke-dasharray="4,3"/>
<text x="152" y="714" font-size="10" fill="#666" font-family="Arial,sans-serif">Alimentation</text>
<line x1="240" y1="710" x2="266" y2="710" stroke="#378ADD" stroke-width="1" stroke-dasharray="4,3"/>
<text x="272" y="714" font-size="10" fill="#666" font-family="Arial,sans-serif">WiFi MAVLink</text>
<line x1="380" y1="710" x2="406" y2="710" stroke="#D85A30" stroke-width="1.5"/>
<text x="412" y="714" font-size="10" fill="#666" font-family="Arial,sans-serif">Commutation relais</text>

</svg>
