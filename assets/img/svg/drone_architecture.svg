<svg width="1100" height="700" viewBox="0 0 1100 700" xmlns="http://www.w3.org/2000/svg" style="background:#0d0d0d;font-family:Arial,sans-serif">

  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4A9EE8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#FF6B3D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#FFB830" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- TITRE -->
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">the_watCh3r — Architecture Système</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#666">by Djalil — Kickstarter Project</text>

  <!-- ============================================================ -->
  <!-- COLONNE GAUCHE                                                -->
  <!-- ============================================================ -->

  <!-- RC TRANSMITTER -->
  <rect x="30" y="80" width="190" height="80" rx="10" fill="#0F2744" stroke="#4A9EE8" stroke-width="1.5"/>
  <text x="125" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#E0F0FF">RC Transmitter</text>
  <text x="125" y="126" text-anchor="middle" font-size="11" fill="#4A9EE8">RadioMaster Pocket ELRS</text>
  <text x="125" y="144" text-anchor="middle" font-size="11" fill="#4A9EE8">2.4 GHz · EdgeTX</text>

  <!-- ELRS RECEIVER -->
  <rect x="30" y="210" width="190" height="85" rx="10" fill="#0F2744" stroke="#4A9EE8" stroke-width="1.5"/>
  <text x="125" y="237" text-anchor="middle" font-size="13" font-weight="700" fill="#E0F0FF">Récepteur ELRS</text>
  <text x="125" y="256" text-anchor="middle" font-size="11" fill="#4A9EE8">RadioMaster XR1 2.4GHz</text>
  <text x="125" y="274" text-anchor="middle" font-size="11" fill="#4A9EE8">Protocole CRSF</text>
  <rect x="65" y="283" width="70" height="18" rx="5" fill="#1a3a6e" stroke="#4A9EE8" stroke-width="1"/>
  <text x="100" y="295" text-anchor="middle" font-size="10" font-weight="700" fill="#4A9EE8">UART 6</text>

  <!-- RC → ELRS (vertical) -->
  <line x1="125" y1="160" x2="125" y2="208" stroke="#4A9EE8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="143" y="188" font-size="10" fill="#4A9EE8">RF 2.4GHz</text>

  <!-- RASPBERRY PI -->
  <rect x="30" y="360" width="190" height="100" rx="10" fill="#1a0f3a" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="125" y="387" text-anchor="middle" font-size="13" font-weight="700" fill="#EDE9FE">Raspberry Pi Zero 2W</text>
  <text x="125" y="406" text-anchor="middle" font-size="11" fill="#A78BFA">Python · MAVLink</text>
  <text x="125" y="424" text-anchor="middle" font-size="11" fill="#A78BFA">WiFi · SSH</text>
  <text x="125" y="442" text-anchor="middle" font-size="11" fill="#A78BFA">Pin 2·6·8·10 GPIO</text>
  <rect x="65" y="450" width="70" height="18" rx="5" fill="#2d1a6e" stroke="#A78BFA" stroke-width="1"/>
  <text x="100" y="462" text-anchor="middle" font-size="10" font-weight="700" fill="#A78BFA">UART 2</text>

  <!-- PROGRAMME -->
  <rect x="30" y="520" width="190" height="80" rx="8" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="125" y="545" text-anchor="middle" font-size="12" font-weight="600" fill="#aaa">Programme</text>
  <text x="125" y="563" text-anchor="middle" font-size="11" fill="#666">Autopilot logic</text>
  <text x="125" y="580" text-anchor="middle" font-size="11" fill="#666">Computer Vision</text>
  <text x="125" y="597" text-anchor="middle" font-size="11" fill="#666">Waypoints</text>

  <!-- Programme → Pi (vertical, remonte) -->
  <line x1="125" y1="518" x2="125" y2="462" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>

  <!-- ============================================================ -->
  <!-- COLONNE CENTRE — FLIGHT CONTROLLER                           -->
  <!-- ============================================================ -->

  <!-- FLIGHT CONTROLLER -->
  <rect x="420" y="240" width="230" height="140" rx="10" fill="#2a0f0f" stroke="#FF6B3D" stroke-width="1.5"/>
  <text x="535" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#FFE0D6">Flight Controller</text>
  <text x="535" y="287" text-anchor="middle" font-size="11" fill="#FF6B3D">SpeedyBee F405 V3</text>
  <text x="535" y="305" text-anchor="middle" font-size="11" fill="#FF6B3D">Betaflight 4.3.2 · DSHOT600</text>
  <!-- Badges UART -->
  <rect x="430" y="318" width="80" height="22" rx="5" fill="#3a1a1a" stroke="#4A9EE8" stroke-width="1.2"/>
  <text x="470" y="333" text-anchor="middle" font-size="11" font-weight="700" fill="#4A9EE8">UART 6 ← ELRS</text>
  <rect x="525" y="318" width="110" height="22" rx="5" fill="#3a1a1a" stroke="#A78BFA" stroke-width="1.2"/>
  <text x="580" y="333" text-anchor="middle" font-size="11" font-weight="700" fill="#A78BFA">UART 2 ← Pi MAVLink</text>
  <!-- Gyro/Baro -->
  <text x="535" y="362" text-anchor="middle" font-size="10" fill="#884422">Gyro BMI270 · Baro DPS310</text>

  <!-- ELRS → FC (horizontal) -->
  <line x1="222" y1="253" x2="418" y2="310" stroke="#4A9EE8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="300" y="270" text-anchor="middle" font-size="10" fill="#4A9EE8">CRSF · UART6 (T6/R6)</text>

  <!-- Pi → FC (horizontal) -->
  <line x1="222" y1="410" x2="418" y2="345" stroke="#A78BFA" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="310" y="395" text-anchor="middle" font-size="10" fill="#A78BFA">MAVLink · UART2 (T2/R2)</text>

  <!-- FC → ESC (vertical bas) -->
  <line x1="535" y1="382" x2="535" y2="440" stroke="#FFB830" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <text x="555" y="415" font-size="10" fill="#FFB830">DSHOT600</text>

  <!-- ============================================================ -->
  <!-- ESC                                                           -->
  <!-- ============================================================ -->
  <rect x="420" y="440" width="230" height="75" rx="10" fill="#2a1f00" stroke="#FFB830" stroke-width="1.5"/>
  <text x="535" y="466" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF3CD">ESC 4-en-1</text>
  <text x="535" y="484" text-anchor="middle" font-size="11" fill="#FFB830">SpeedyBee F405 V3 Stack</text>
  <text x="535" y="502" text-anchor="middle" font-size="11" fill="#FFB830">6S · 45A par moteur</text>

  <!-- ESC → Motors (vertical bas) -->
  <line x1="535" y1="517" x2="535" y2="565" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="555" y="545" font-size="10" fill="#4CAF50">3 fils PWM</text>

  <!-- ============================================================ -->
  <!-- MOTORS                                                        -->
  <!-- ============================================================ -->
  <rect x="420" y="565" width="230" height="75" rx="10" fill="#0a1f0a" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="535" y="591" text-anchor="middle" font-size="13" font-weight="700" fill="#C8F5C8">Moteurs × 4</text>
  <text x="535" y="609" text-anchor="middle" font-size="11" fill="#4CAF50">AxisFlying AE2207 · 6S</text>
  <text x="535" y="627" text-anchor="middle" font-size="11" fill="#4CAF50">Hélices 5 pouces</text>

  <!-- ============================================================ -->
  <!-- COLONNE DROITE                                                -->
  <!-- ============================================================ -->

  <!-- BATTERY -->
  <rect x="840" y="240" width="210" height="85" rx="10" fill="#2a1500" stroke="#FFB830" stroke-width="1.5"/>
  <text x="945" y="267" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF3CD">LiPo Battery</text>
  <text x="945" y="286" text-anchor="middle" font-size="11" fill="#FFB830">ManiaX 6S 1800mAh</text>
  <text x="945" y="304" text-anchor="middle" font-size="11" fill="#FFB830">150C · Connecteur XT60</text>
  <text x="945" y="318" text-anchor="middle" font-size="10" fill="#884400">Alim FC + ESC + Pi (4V5)</text>

  <!-- Battery → FC (horizontal gauche) -->
  <line x1="838" y1="283" x2="652" y2="295" stroke="#FFB830" stroke-width="2" marker-end="url(#arr-amber)"/>
  <text x="745" y="278" text-anchor="middle" font-size="10" fill="#FFB830">6S Power · XT60</text>

  <!-- FAILSAFE -->
  <rect x="840" y="380" width="210" height="85" rx="10" fill="none" stroke="#FF6B3D" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="945" y="406" text-anchor="middle" font-size="13" font-weight="600" fill="#FF6B3D">⚠ Failsafe MAVLink</text>
  <text x="945" y="425" text-anchor="middle" font-size="11" fill="#888">Perte signal radio</text>
  <text x="945" y="443" text-anchor="middle" font-size="11" fill="#888">Pi coupe ESC</text>
  <text x="945" y="459" text-anchor="middle" font-size="11" fill="#888">Atterrissage autonome</text>

  <!-- Failsafe ← FC (horizontal) -->
  <line x1="838" y1="422" x2="652" y2="360" stroke="#FF6B3D" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-coral)"/>
  <text x="745" y="380" text-anchor="middle" font-size="10" fill="#FF6B3D">Signal loss detection</text>

  <!-- WIFI SSH -->
  <rect x="840" y="510" width="210" height="80" rx="10" fill="#1a0f3a" stroke="#A78BFA" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="945" y="536" text-anchor="middle" font-size="13" font-weight="600" fill="#EDE9FE">WiFi · SSH</text>
  <text x="945" y="555" text-anchor="middle" font-size="11" fill="#A78BFA">Configuration à distance</text>
  <text x="945" y="573" text-anchor="middle" font-size="11" fill="#A78BFA">Surveillance live</text>
  <text x="945" y="585" text-anchor="middle" font-size="10" fill="#534e8a">Base de recharge ↔ Drone</text>



  <!-- ============================================================ -->
  <!-- LÉGENDE                                                       -->
  <!-- ============================================================ -->
  <rect x="30" y="655" width="1040" height="38" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="55" y1="674" x2="85" y2="674" stroke="#4A9EE8" stroke-width="2"/>
  <text x="92" y="677" font-size="10" fill="#aaa">RF / ELRS UART6</text>
  <line x1="210" y1="674" x2="240" y2="674" stroke="#A78BFA" stroke-width="2"/>
  <text x="247" y="677" font-size="10" fill="#aaa">MAVLink Pi UART2</text>
  <line x1="375" y1="674" x2="405" y2="674" stroke="#FFB830" stroke-width="2"/>
  <text x="412" y="677" font-size="10" fill="#aaa">Alimentation 6S</text>
  <line x1="530" y1="674" x2="560" y2="674" stroke="#4CAF50" stroke-width="2"/>
  <text x="567" y="677" font-size="10" fill="#aaa">Commande moteurs</text>
  <line x1="700" y1="674" x2="730" y2="674" stroke="#FF6B3D" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="737" y="677" font-size="10" fill="#aaa">Failsafe</text>
  <line x1="800" y1="674" x2="830" y2="674" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="837" y="677" font-size="10" fill="#aaa">Logiciel embarqué</text>

</svg>
